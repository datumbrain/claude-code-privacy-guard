name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: what-was-blocked
    attributes:
      label: What was blocked (or not blocked)?
      description: >
        If this is about a prompt being blocked or let through, paste the
        block message / findings list here. Redact the actual secret value
        itself, but keep the rule name and enough shape to reproduce (e.g.
        "sk-proj-xxxxxxxxxxxxxxxxxxxx" instead of a real key).
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, including the input text pattern if relevant.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin version
      description: From `.claude-plugin/plugin.json` or `npm ls claude-code-privacy-guard`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 14 / Ubuntu 22.04 / Windows 11
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: .privacy-guard.json (if you have one)
      render: json
    validations:
      required: false
